version: "3.8"

# Staging Environment
# Usage: docker compose -f docker-compose.staging.yml up

services:
  postgres-staging:
    image: postgres:15
    container_name: data-sovereignty-postgres-staging
    environment:
      POSTGRES_DB: langgraph_staging
      POSTGRES_USER: langgraph
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5433:5432" # Different port to avoid conflicts
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langgraph"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-sovereignty-staging

  redis-staging:
    image: redis:7-alpine
    container_name: data-sovereignty-redis-staging
    ports:
      - "6380:6379" # Different port to avoid conflicts
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-sovereignty-staging

  langgraph-api-staging:
    build:
      context: .
      dockerfile: Dockerfile.langgraph
    container_name: data-sovereignty-langgraph-staging
    ports:
      - "54368:54367" # Different port to avoid conflicts
    env_file:
      - .env.staging
    environment:
      - NODE_ENV=staging
      - POSTGRES_HOST=postgres-staging
      - POSTGRES_PORT=5432
      - POSTGRES_DB=langgraph_staging
      - POSTGRES_USER=langgraph
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - REDIS_HOST=redis-staging
      - REDIS_PORT=6379
      - LANGGRAPH_API_URL=http://localhost:54368
    depends_on:
      postgres-staging:
        condition: service_healthy
      redis-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:54367/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - data-sovereignty-staging
    restart: unless-stopped

  auth-server-staging:
    build:
      context: .
      dockerfile: Dockerfile.web-ui
    container_name: data-sovereignty-auth-staging
    command: ["node", "dist/src/auth/auth-server.js"]
    ports:
      - "3002:3000" # Different port to avoid conflicts
    env_file:
      - .env.staging
    environment:
      - NODE_ENV=staging
      - AUTH_SERVER_PORT=3000
      - AUTH_SERVER_HOST=0.0.0.0
      - POSTGRES_HOST=postgres-staging
      - POSTGRES_PORT=5432
      - POSTGRES_DB=langgraph_staging
      - POSTGRES_USER=langgraph
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - REDIS_HOST=redis-staging
      - REDIS_PORT=6379
    depends_on:
      postgres-staging:
        condition: service_healthy
      redis-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - data-sovereignty-staging
    restart: unless-stopped

  web-ui-staging:
    build:
      context: .
      dockerfile: Dockerfile.web-ui
    container_name: data-sovereignty-web-ui-staging
    ports:
      - "3003:3001" # Different port to avoid conflicts
    env_file:
      - .env.staging
    environment:
      - NODE_ENV=staging
      - WEB_UI_PORT=3001
      - WEB_UI_HOST=0.0.0.0
      - LANGGRAPH_API_URL=http://langgraph-api-staging:54367
      - AUTH_SERVER_URL=http://auth-server-staging:3000
    depends_on:
      langgraph-api-staging:
        condition: service_healthy
      auth-server-staging:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - data-sovereignty-staging
    restart: unless-stopped

volumes:
  postgres_staging_data:
  redis_staging_data:

networks:
  data-sovereignty-staging:
    driver: bridge

version: "3.8"

# Production Environment
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  postgres-prod:
    image: postgres:15
    container_name: data-sovereignty-postgres-prod
    environment:
      POSTGRES_DB: langgraph_prod
      POSTGRES_USER: langgraph
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432" # Different port to avoid conflicts
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langgraph"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-sovereignty-prod
    restart: always

  redis-prod:
    image: redis:7-alpine
    container_name: data-sovereignty-redis-prod
    ports:
      - "6381:6379" # Different port to avoid conflicts
    volumes:
      - redis_prod_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${REDIS_PASSWORD:-changeme}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-sovereignty-prod
    restart: always

  langgraph-api-prod:
    build:
      context: .
      dockerfile: Dockerfile.langgraph
    container_name: data-sovereignty-langgraph-prod
    ports:
      - "54369:54367" # Different port to avoid conflicts
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres-prod
      - POSTGRES_PORT=5432
      - POSTGRES_DB=langgraph_prod
      - POSTGRES_USER=langgraph
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis-prod
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - LANGGRAPH_API_URL=http://localhost:54369
    depends_on:
      postgres-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:54367/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - data-sovereignty-prod
    restart: always

  auth-server-prod:
    build:
      context: .
      dockerfile: Dockerfile.web-ui
    container_name: data-sovereignty-auth-prod
    command: ["node", "dist/src/auth/auth-server.js"]
    ports:
      - "3004:3000" # Different port to avoid conflicts
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - AUTH_SERVER_PORT=3000
      - AUTH_SERVER_HOST=0.0.0.0
      - POSTGRES_HOST=postgres-prod
      - POSTGRES_PORT=5432
      - POSTGRES_DB=langgraph_prod
      - POSTGRES_USER=langgraph
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis-prod
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
    depends_on:
      postgres-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - data-sovereignty-prod
    restart: always

  web-ui-prod:
    build:
      context: .
      dockerfile: Dockerfile.web-ui
    container_name: data-sovereignty-web-ui-prod
    ports:
      - "3005:3001" # Different port to avoid conflicts
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      - WEB_UI_PORT=3001
      - WEB_UI_HOST=0.0.0.0
      - LANGGRAPH_API_URL=http://langgraph-api-prod:54367
      - AUTH_SERVER_URL=http://auth-server-prod:3000
    depends_on:
      langgraph-api-prod:
        condition: service_healthy
      auth-server-prod:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - data-sovereignty-prod
    restart: always

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  data-sovereignty-prod:
    driver: bridge
